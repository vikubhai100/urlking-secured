# URLKING Frontend - Host Nginx Configuration
# Place this file at /etc/nginx/sites-available/urlking.in
# Then: ln -s /etc/nginx/sites-available/urlking.in /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

# Redirect www to non-www (CRITICAL: Fixes 502 Bad Gateway on www.urlking.in)
server {
    listen 80;
    server_name www.urlking.in;
    return 301 https://urlking.in$request_uri;
}

server {
    listen 80;
    server_name urlking.in;

    # Let Cloudflare handle SSL - this is the origin server config
    # If using Cloudflare Flexible SSL, no need for SSL config here
    # If using Full SSL, add SSL certificates below

    location / {
        proxy_pass http://127.0.0.1:3080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

